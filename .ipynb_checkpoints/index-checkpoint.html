<!DOCTYPE html>
<html>
<head>
    <title>Customer Review Analyzer</title>
    <style>
        body { font-family: Arial; padding: 20px; }
        textarea { width: 100%; height: 100px; }
        button { padding: 10px; margin-top: 10px; }
        .result { margin-top: 20px; }
    </style>
</head>
<body>

<h2>Customer Review Analyzer</h2>

<textarea id="review" placeholder="Enter customer review..."></textarea>
<br>
<button onclick="analyze()">Analyze</button>

<div class="result">
    <p><strong>Sentiment:</strong> <span id="sentiment"></span></p>
    <p><strong>Keywords:</strong> <span id="keywords"></span></p>
</div>

<script>
function analyze() {
    const review = document.getElementById("review").value;

    fetch("http://127.0.0.1:5000/analyze", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({ review })
    })
    .then(res => res.json())
    .then(data => {
        document.getElementById("sentiment").innerText = data.sentiment;
        document.getElementById("keywords").innerText = data.keywords.join(", ");
    });
}
</script>

</body>
</html>
